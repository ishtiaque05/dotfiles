# ============================================
# tmux configuration
# ============================================

# --- Prefix Key ---
# Remap from Ctrl-b to Ctrl-a (closer to home row)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Sensible Defaults ---
set -g base-index 1           # Windows start at 1
setw -g pane-base-index 1     # Panes start at 1
set -g renumber-windows on    # No gaps when closing windows
set -g mouse on               # Mouse mode: click panes, scroll, resize
set -g history-limit 50000    # Generous scrollback

# --- True Color Support ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# Set escape time (important for Neovim)
set -sg escape-time 10

# Set focus events (important for Neovim autoread)
set -g focus-events on

# --- Splits ---
# Horizontal split with - (the dash is a horizontal line)
bind - split-window -v -c "#{pane_current_path}"
# Vertical split with | (the pipe is a vertical line)
bind | split-window -h -c "#{pane_current_path}"
# Unbind old defaults
unbind '"'
unbind %

# New windows open in current path
bind c new-window -c "#{pane_current_path}"

# Switch windows with Shift+arrow
bind -n S-Left previous-window
bind -n S-Right next-window

# --- Vim-Style Navigation ---
# Navigate panes with h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vi-style copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
# OS-specific copy command is handled by tmux-yank plugin

# --- Quick reload ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Plugins (via TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# --- Plugin Settings ---
set -g @continuum-restore 'on'       # Auto-restore last saved session
set -g @resurrect-capture-pane-contents 'on'

# --- Initialize TPM (must be last line) ---
run '~/.tmux/plugins/tpm/tpm'
